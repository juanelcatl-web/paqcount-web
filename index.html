<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="theme-color" content="#0A0A14" />
  <title>PaqCount</title>
  <link rel="manifest" href="manifest.json" />
  <link rel="stylesheet" href="style.css" />

  <script async src="https://www.googletagmanager.com/gtag/js?id=G-27TMM5ZCE2"></script>
  <script>
    window.dataLayer = window.dataLayer || [];
    function gtag(){dataLayer.push(arguments);}
    gtag('js', new Date());

    // Detectar si es PWA instalada o Navegador
    const isPWA = window.matchMedia('(display-mode: standalone)').matches || window.navigator.standalone;
    
    gtag('config', 'G-27TMM5ZCE2', {
      'page_title': 'PaqCount_Console',
      'platform_type': isPWA ? 'App_PWA_Instalada' : 'Web_Navegador_PC'
    });
  </script>
</head>
<body>

  <div id="screen-login" class="screen active">
    <div class="login-box">
      <div class="logo">📦</div>
      <h1>PaqCount</h1>
      <p class="tagline">Modo Depósito Inteligente</p>
      <button id="btn-google-login" class="btn-google">
        <img src="https://www.gstatic.com/firebasejs/ui/2.0.0/images/auth/google.svg" width="20" />
        Continuar con Google
      </button>
    </div>
  </div>

  <div id="screen-scanner" class="screen">
    <div class="topbar">
      <div class="topbar-left">
        <span class="app-name">PaqCount</span>
        <span id="badge-online" class="badge badge-online">● Online</span>
      </div>
      <div class="topbar-right">
        <button id="btn-menu" class="btn-icon">⋮</button>
      </div>
    </div>

    <div id="banner-offline" class="banner-offline hidden">☁ Modo Offline Activo</div>

    <div class="modo-toggle">
      <button id="btn-entrada" class="modo-btn modo-active">📥 Entrada</button>
      <button id="btn-salida" class="modo-btn">📤 Salida</button>
    </div>

    <div class="resumen-bar">
      <div class="resumen-item">
        <span class="resumen-num" id="res-entradas">0</span>
        <span class="resumen-label">Entradas</span>
      </div>
      <div class="resumen-divider"></div>
      <div class="resumen-item">
        <span class="resumen-num" id="res-salidas">0</span>
        <span class="resumen-label">Salidas</span>
      </div>
      <div class="resumen-divider"></div>
      <div class="resumen-item alerta">
        <span class="resumen-num" id="res-faltantes">0</span>
        <span class="resumen-label">Stock</span>
      </div>
    </div>

    <div class="camera-wrap">
      <video id="video" autoplay playsinline muted></video>
      <div class="scan-frame">
        <div class="corner tl"></div><div class="corner tr"></div>
        <div class="corner bl"></div><div class="corner br"></div>
        <div class="scan-line"></div>
      </div>
      <div id="scan-status" class="scan-status">Iniciando...</div>
    </div>

    <div class="bottom-bar">
      <button id="btn-ubicacion" class="btn-zona">📍 ZonaA</button>
      <button id="btn-torch" class="btn-icon-bar">🔦</button>
      <button id="btn-historial" class="btn-icon-bar">🕒</button>
    </div>
  </div>

  <div id="screen-historial" class="screen">
    <div class="topbar">
      <button id="btn-back" class="btn-icon">←</button>
      <span class="app-name">Historial</span>
    </div>
    <div id="lista-historial" class="lista"></div>
  </div>

  <div id="modal-ubicacion" class="modal hidden">
    <div class="modal-box">
      <h3>Seleccioná la Ubicación</h3>
      <div class="zona-grid" id="zona-grid"></div>
      <button id="btn-cerrar-modal" class="btn-secondary">Cerrar</button>
    </div>
  </div>

  <script type="module" src="app.js"></script>
</body>
</html>
